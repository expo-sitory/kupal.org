<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Consoles</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        h1 {
            margin-bottom: 20px;
            font-size: 24px;
            color: #e2e8f0;
        }

        .console-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 20px;
        }

        .console-window {
            display: flex;
            flex-direction: column;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            overflow: hidden;
            height: 600px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .console-header {
            background: #1e293b;
            border-bottom: 1px solid #334155;
            padding: 12px 16px;
            font-size: 14px;
            font-weight: 600;
            color: #e2e8f0;
        }

        .console-body {
            flex: 1;
            overflow: hidden;
            background: #0f172a;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        @media (max-width: 768px) {
            .console-grid {
                grid-template-columns: 1fr;
            }

            .console-window {
                height: 500px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Server Consoles</h1>

        <div class="console-grid">
            <!-- LUZON -->
            <div class="console-window">
                <div class="console-header">LUZON</div>
                <div class="console-body">
                    <iframe src="https://gp.empowerservers.com/server/51eda0ea/console/popup">
                    </iframe>
                </div>
            </div>

            <!-- VISAYAS -->
            <div class="console-window">
                <div class="console-header">VISAYAS</div>
                <div class="console-body">
                    <iframe src="https://gp.empowerservers.com/server/ca80db5e/console/popup">
                    </iframe>
                </div>
            </div>

            <!-- MINDANAO -->
            <div class="console-window">
                <div class="console-header">MINDANAO</div>
                <div class="console-body">
                    <iframe src="https://gp.empowerservers.com/server/9556379d/console/popup">
                    </iframe>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
